name: Build and Release Flutter Packages

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths-ignore:
      - "README.md"
  pull_request:
    branches:
      - main
    paths:
      - "lib/**"
      - "assets/**"
      - "android/**"
      - "ios/**"
      - "macos/**"
      - "linux/**"
      - "windows/**"
      - "go_core/**"
      - "build_scripts/**"
      - "scripts/**"
      - "pubspec.*"
      - "Makefile"
      - ".gitmodules"
      - ".github/workflows/build-and-release.yml"
  schedule:
    - cron: "0 19 * * 0"
  workflow_dispatch:

permissions:
  contents: write

env:
  XSTREAM_APPLE_TEAM_ID: N3G9T67W78
  XSTREAM_APP_GROUP_ID: group.plus.svc.xstream
  XSTREAM_IOS_BUNDLE_ID: plus.svc.xstream
  XSTREAM_IOS_PACKET_TUNNEL_BUNDLE_ID: plus.svc.xstream.PacketTunnel
  XSTREAM_MACOS_BUNDLE_ID: plus.svc.xstream
  XSTREAM_MACOS_PACKET_TUNNEL_BUNDLE_ID: plus.svc.xstream.PacketTunnel

jobs:
  clean-daily-tags:
    if: ${{ github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Clean old daily tags
        shell: bash
        run: bash ./scripts/clean_old_tags.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  code-analysis:
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.3"
          cache: true
      - name: Install analysis dependencies
        shell: bash
        run: bash ./scripts/ci/setup_platform_deps.sh linux
      - name: Run code analysis
        shell: bash
        run: bash ./scripts/ci/run_code_analysis.sh

  build:
    if: ${{ github.event_name != 'schedule' }}
    strategy:
      fail-fast: false
      matrix:
        platform: [linux, windows, macos, android, ios]
        arch: [x64, arm64]
        exclude:
          - platform: linux
            arch: arm64
          - platform: windows
            arch: arm64
          - platform: macos
            arch: x64
          - platform: ios
            arch: x64
          - platform: android
            arch: x64
        include:
          - platform: macos
            arch: arm64
          - platform: linux
            arch: x64
          - platform: windows
            arch: x64
          - platform: ios
            arch: arm64
          - platform: android
            arch: arm64

    runs-on: ${{ fromJson('{"windows":"windows-latest","linux":"ubuntu-22.04","android":"ubuntu-latest","macos":"macos-latest","ios":"macos-latest"}')[matrix.platform] }}

    env:
      PLATFORM: ${{ matrix.platform }}
      ARCH: ${{ matrix.arch }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.3"
          cache: true

      - name: Set up Go
        if: ${{ matrix.platform != 'macos' }}
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Set up MSYS2 toolchain
        if: ${{ matrix.platform == 'windows' }}
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Install platform dependencies
        shell: bash
        run: bash ./scripts/ci/setup_platform_deps.sh "$PLATFORM"

      - name: Build platform artifacts
        shell: bash
        run: bash ./scripts/ci/build_matrix_artifacts.sh "$PLATFORM" "$ARCH"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            build/macos/*.dmg
            build/linux/x64/release/bundle/xstream-linux.zip
            build/linux/x64/release/AppImage/xstream-linux.AppImage
            build/linux/x64/release/packages/*.deb
            build/linux/x64/release/packages/*.rpm
            build/windows/x64/runner/Release/xstream-windows.zip
            build/windows/x64/runner/Release/*.msix
            build/app/outputs/flutter-apk/app-release.apk
            build/ios/iphoneos/XStream.app.zip
            build/ios/ipa/*.ipa

  release:
    if: ${{ github.event_name != 'pull_request' && github.event_name != 'schedule' }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        platform:
          - { name: macos, file_pattern: "*.dmg", remote_path: "xstream/macos/latest/xstream-macos-latest.dmg" }
          - { name: linux, file_pattern: "xstream-linux.zip", remote_path: "xstream/linux/latest/xstream-linux-latest.zip" }
          - { name: windows, file_pattern: "xstream-windows.zip", remote_path: "xstream/windows/latest/xstream-windows-latest.zip" }
          - { name: ios, file_pattern: "*.ipa", remote_path: "xstream/ios/latest/xstream-ios-latest.ipa" }
          - { name: android, file_pattern: "app-release.apk", remote_path: "xstream/android/latest/xstream-android-latest.apk" }
          - { name: github, file_pattern: "**/*", remote_path: "" }

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Upload assets to GitHub Release
        if: ${{ matrix.platform.name == 'github' }}
        shell: bash
        run: bash ./scripts/ci/github_release_upload.sh release-artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: daily-${{ github.run_number }}
          RELEASE_TITLE: Daily Build ${{ github.run_number }}

      - name: Sync assets to remote update server
        if: ${{ matrix.platform.name != 'github' }}
        shell: bash
        run: bash ./scripts/ci/remote_release_sync.sh "${{ matrix.platform.name }}" "${{ matrix.platform.file_pattern }}" "${{ matrix.platform.remote_path }}"
        env:
          ARTIFACT_DIR: release-artifacts
          RSYNC_SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}

  update-readme:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Refresh README download links
        shell: bash
        run: bash ./scripts/ci/update_readme_from_release.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: daily-${{ github.run_number }}
