name: xstream
arch: amd64
platform: linux
version: ${VERSION}
section: net
priority: optional
maintainer: Xstream Team <support@svc.plus>
description: |
  Xstream Linux desktop client with proxy mode by default and optional tunnel mode.
homepage: https://svc.plus
license: Proprietary
contents:
  - src: ./dist/linux/package-root/opt/xstream/
    dst: /opt/xstream
    type: tree
  - src: ./dist/linux/package-root/usr/share/applications/xstream.desktop
    dst: /usr/share/applications/xstream.desktop
  - src: ./dist/linux/package-root/usr/share/icons/hicolor/256x256/apps/xstream.png
    dst: /usr/share/icons/hicolor/256x256/apps/xstream.png
  - src: ./dist/linux/package-root/usr/libexec/xstream/xstream-net-helper
    dst: /usr/libexec/xstream/xstream-net-helper
    file_info:
      mode: 0755
  - src: ./dist/linux/package-root/usr/share/polkit-1/actions/org.xstream.policy
    dst: /usr/share/polkit-1/actions/org.xstream.policy
overrides:
  deb:
    depends:
      - libayatana-appindicator3-1
      - libnotify-bin
      - policykit-1
      - iproute2
  rpm:
    depends:
      - libappindicator-gtk3
      - libnotify
      - polkit
      - iproute
scripts:
  postinstall: ./packaging/nfpm/postinstall.sh
